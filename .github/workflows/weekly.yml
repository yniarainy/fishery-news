name: Weekly Fishery Newsletter

on:
  schedule:
    # 每周一北京时间 08:00 (UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        type: choice
        default: 'weekly'
        options: [weekly, collect, process, output]

# 全局权限：读仓库 + 写 Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: newsletter-generation
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: |
            data/fishery_news.db
            data/chroma/
          key: fishery-db-${{ github.run_number }}
          restore-keys: fishery-db-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install httpx feedparser beautifulsoup4 lxml openai chromadb \
                      pydantic pyyaml jinja2 python-dateutil rich langdetect \
                      tenacity scikit-learn

      - name: Generate Newsletter
        run: python src/main.py --mode weekly
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
